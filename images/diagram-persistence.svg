<svg xmlns="http://www.w3.org/2000/svg" width="1110" height="560" viewBox="0 0 1110 560" font-family="Arial, Helvetica, sans-serif">
  <rect width="1110" height="560" fill="#ffffff"/>

  <!-- connectors -->
  <g fill="none" stroke="#9aa6ad" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M430 84 L430 121"/>
    <path d="M430 179 L430 207"/>
    <path d="M430 337 L430 372"/>
    <path d="M548 272 L700 272"/>
    <path d="M430 436 L430 470"/>
    <path d="M426 115 L430 121 L434 115"/>
    <path d="M426 201 L430 207 L434 201"/>
    <path d="M426 366 L430 372 L434 366"/>
    <path d="M694 268 L700 272 L694 276"/>
    <path d="M426 464 L430 470 L434 464"/>
  </g>
  <text x="450" y="357" font-size="13" font-weight="bold" fill="#555555">No</text>
  <text x="624" y="263" font-size="13" font-weight="bold" fill="#555555" text-anchor="middle">Yes</text>

  <!-- A: Malware starts -->
  <rect x="280" y="26" width="300" height="58" rx="10" fill="#DC3F52"/>
  <g transform="translate(310,55)" fill="none" stroke="#ffffff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="13"/>
    <path d="M-4 -6 L8 1 L-4 8 Z" fill="#ffffff" stroke="none"/>
  </g>
  <text x="336" y="51" font-size="14" font-weight="bold" fill="#ffffff">Malware starts</text>
  <text x="336" y="68" font-size="11" fill="#ffffff" fill-opacity="0.85">the process begins</text>

  <!-- B: Copies itself -->
  <rect x="280" y="121" width="300" height="58" rx="10" fill="#DC3F52"/>
  <g transform="translate(310,150)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-11" y="-11" width="15" height="15" rx="2"/>
    <rect x="-3" y="-3" width="15" height="15" rx="2"/>
  </g>
  <text x="336" y="146" font-size="14" font-weight="bold" fill="#ffffff">Copies itself</text>
  <text x="336" y="163" font-size="11" fill="#ffffff" fill-opacity="0.85">to the Local Studio folder</text>

  <!-- C: decision diamond -->
  <path d="M430 207 L548 272 L430 337 L312 272 Z" fill="#FAB94D"/>
  <text x="430" y="256" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">Does my task</text>
  <text x="430" y="274" font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">already exist?</text>
  <text x="430" y="293" font-size="11" fill="#ffffff" fill-opacity="0.9" text-anchor="middle" font-family="Consolas, 'Courier New', monospace">schtasks /query</text>

  <!-- D: Do nothing -->
  <rect x="700" y="243" width="240" height="58" rx="10" fill="#1A4B6C"/>
  <g transform="translate(730,272)" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-9 0 L-3 7 L10 -9"/>
  </g>
  <text x="756" y="268" font-size="14" font-weight="bold" fill="#ffffff">Do nothing</text>
  <text x="756" y="285" font-size="11" fill="#ffffff" fill-opacity="0.85">task already there</text>

  <!-- E: schtasks /create -->
  <rect x="280" y="372" width="300" height="64" rx="10" fill="#3599B1"/>
  <g transform="translate(310,404)" fill="none" stroke="#ffffff" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="-1" cy="0" r="9"/>
    <path d="M-1 0 L-1 -6 M-1 0 L4 2"/>
    <path d="M10 -10 L10 -4 M7 -7 L13 -7"/>
  </g>
  <text x="336" y="399" font-size="14" font-weight="bold" fill="#ffffff" font-family="Consolas, 'Courier New', monospace">schtasks /create</text>
  <text x="336" y="417" font-size="11.5" fill="#ffffff" fill-opacity="0.9" font-family="Consolas, 'Courier New', monospace">/sc ONLOGON</text>

  <!-- F: runs at every logon -->
  <rect x="280" y="470" width="300" height="64" rx="10" fill="#30679D"/>
  <g transform="translate(310,502)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0 -11 L0 -2"/>
    <path d="M-7 -7 A10 10 0 1 0 7 -7"/>
  </g>
  <text x="336" y="497" font-size="14" font-weight="bold" fill="#ffffff">Runs at every logon</text>
  <text x="336" y="515" font-size="11" fill="#ffffff" fill-opacity="0.85">persistence achieved</text>
</svg>
