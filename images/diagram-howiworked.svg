<svg xmlns="http://www.w3.org/2000/svg" width="1110" height="470" viewBox="0 0 1110 470" font-family="Arial, Helvetica, sans-serif">
  <rect width="1110" height="470" fill="#ffffff"/>

  <!-- connectors: sample -> hubs -->
  <path d="M132 240 C195 213 185 150 235 150" fill="none" stroke="#3599B1" stroke-width="2.6"/>
  <path d="M132 282 C195 309 185 373 235 373" fill="none" stroke="#30679D" stroke-width="2.6"/>

  <!-- connectors: dynamic hub -> 3 leaves -->
  <g fill="none" stroke="#3599B1" stroke-width="2.2">
    <path d="M437 150 C520 150 525 93 600 93"/>
    <path d="M437 151 L600 153"/>
    <path d="M437 150 C520 150 525 213 600 213"/>
  </g>
  <!-- connectors: static hub -> 3 leaves -->
  <g fill="none" stroke="#30679D" stroke-width="2.2">
    <path d="M437 373 C520 373 525 313 600 313"/>
    <path d="M437 372 L600 373"/>
    <path d="M437 373 C520 373 525 433 600 433"/>
  </g>

  <!-- ===== The sample ===== -->
  <circle cx="92" cy="261" r="46" fill="#FAB94D"/>
  <circle cx="92" cy="261" r="40" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"/>
  <g transform="translate(92,261)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-13 -17 L7 -17 L14 -10 L14 17 L-13 17 Z"/>
    <path d="M7 -17 L7 -10 L14 -10"/>
    <path d="M-8 -3 L9 -3 M-8 4 L9 4 M-8 11 L3 11"/>
  </g>
  <text x="92" y="332" font-size="14" font-weight="bold" fill="#23303a" text-anchor="middle">The sample</text>

  <!-- ===== Dynamic analysis hub ===== -->
  <rect x="235" y="118" width="202" height="64" rx="10" fill="#3599B1"/>
  <g transform="translate(269,150)" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-13 0 Q0 -10 13 0 Q0 10 -13 0 Z"/>
    <circle cx="0" cy="0" r="3.6" fill="#ffffff" stroke="none"/>
  </g>
  <text x="296" y="146" font-size="15" font-weight="bold" fill="#ffffff">Dynamic analysis</text>
  <text x="296" y="164" font-size="11" fill="#ffffff" fill-opacity="0.85">run it and watch</text>

  <!-- ===== Static analysis hub ===== -->
  <rect x="235" y="341" width="202" height="64" rx="10" fill="#30679D"/>
  <g transform="translate(269,373)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-5 -8 L-12 0 L-5 8"/>
    <path d="M5 -8 L12 0 L5 8"/>
    <path d="M2 -9 L-2 9"/>
  </g>
  <text x="296" y="369" font-size="15" font-weight="bold" fill="#ffffff">Static analysis</text>
  <text x="296" y="387" font-size="11" fill="#ffffff" fill-opacity="0.85">read the code</text>

  <!-- ===== Dynamic leaves (teal) ===== -->
  <g>
    <rect x="600" y="70" width="420" height="46" rx="6" fill="#E8E8E8"/>
    <rect x="600" y="70" width="6" height="46" fill="#3599B1"/>
    <text x="624" y="98" font-size="13.5" fill="#333333">Process tree</text>

    <rect x="600" y="130" width="420" height="46" rx="6" fill="#E8E8E8"/>
    <rect x="600" y="130" width="6" height="46" fill="#3599B1"/>
    <text x="624" y="158" font-size="13.5" fill="#333333">Persistence (scheduled task)</text>

    <rect x="600" y="190" width="420" height="46" rx="6" fill="#E8E8E8"/>
    <rect x="600" y="190" width="6" height="46" fill="#3599B1"/>
    <text x="624" y="218" font-size="13.5" fill="#333333">Network / C2</text>
  </g>

  <!-- ===== Static leaves (blue) ===== -->
  <g>
    <rect x="600" y="290" width="420" height="46" rx="6" fill="#E8E8E8"/>
    <rect x="600" y="290" width="6" height="46" fill="#30679D"/>
    <text x="624" y="318" font-size="13.5" fill="#333333">Loader structure</text>

    <rect x="600" y="350" width="420" height="46" rx="6" fill="#E8E8E8"/>
    <rect x="600" y="350" width="6" height="46" fill="#30679D"/>
    <text x="624" y="378" font-size="13.5" fill="#333333">Unpacking the hidden stage</text>

    <rect x="600" y="410" width="420" height="46" rx="6" fill="#E8E8E8"/>
    <rect x="600" y="410" width="6" height="46" fill="#30679D"/>
    <text x="624" y="438" font-size="13.5" fill="#333333">Found the injector</text>
  </g>
</svg>
