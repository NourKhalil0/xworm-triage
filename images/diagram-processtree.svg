    <circle cx="0" cy="0" r="2"/>
    <path d="M0 -11 L0 -6 M0 11 L0 6 M-11 0 L-6 0 M11 0 L6 0 M-8 -8 L-4 -4 M8 8 L4 4 M-8 8 L-4 4 M8 -8 L4 -4"/>
  </g>
  <text x="826" y="281" font-size="14" font-weight="bold" fill="#ffffff" font-family="Consolas, 'Courier New', monospace">jsc.exe</text>
  <text x="826" y="300" font-size="11.5" fill="#ffffff" fill-opacity="0.9">Microsoft .NET tool (LOLBin)</text>
