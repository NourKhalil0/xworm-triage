<svg xmlns="http://www.w3.org/2000/svg" width="1110" height="360" viewBox="0 0 1110 360" font-family="Arial, Helvetica, sans-serif">
  <rect width="1110" height="360" fill="#ffffff"/>

  <!-- connectors -->
  <g fill="none" stroke="#9aa6ad" stroke-width="2.4" stroke-linecap="round">
    <path d="M555 88 L555 130"/>
    <path d="M555 194 L555 222"/>
    <path d="M190 222 L920 222"/>
    <path d="M190 222 L190 250"/>
    <path d="M555 222 L555 250"/>
    <path d="M920 222 L920 250"/>
  </g>
  <g fill="none" stroke="#9aa6ad" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
