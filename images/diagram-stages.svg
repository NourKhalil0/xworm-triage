<svg xmlns="http://www.w3.org/2000/svg" width="1094" height="360" viewBox="0 0 1094 360" font-family="Arial, Helvetica, sans-serif">
  <rect width="1094" height="360" fill="#ffffff"/>

  <path d="M24 12 L226 12 L254 180 L226 348 L24 348 Q12 348 12 336 L12 24 Q12 12 24 12 Z" fill="#F7BB49"/>
  <path d="M226 12 L440 12 L468 180 L440 348 L226 348 L254 180 Z" fill="#DB3E53"/>
  <path d="M440 12 L654 12 L682 180 L654 348 L440 348 L468 180 Z" fill="#369AB6"/>
  <path d="M654 12 L868 12 L896 180 L868 348 L654 348 L682 180 Z" fill="#3367A1"/>
  <path d="M868 12 L1070 12 Q1082 12 1082 24 L1082 336 Q1082 348 1070 348 L868 348 L896 180 Z" fill="#1A4A6E"/>

  <g fill="none" stroke="#ffffff" stroke-width="7" stroke-linejoin="round">
    <path d="M226 12 L254 180 L226 348"/>
    <path d="M440 12 L468 180 L440 348"/>
    <path d="M654 12 L682 180 L654 348"/>
    <path d="M868 12 L896 180 L868 348"/>
  </g>

  <!-- Panel 1: Loader -->
  <g text-anchor="middle" fill="#ffffff">
    <circle cx="119" cy="88" r="33" fill="none" stroke="#ffffff" stroke-width="2.6"/>
    <text x="119" y="97" font-size="27" font-weight="bold">01</text>
    <text x="119" y="156" font-size="19" font-weight="bold">Loader</text>
    <text x="119" y="186" font-size="12.3" fill-opacity="0.82">
      <tspan x="119" dy="0">Stage 1. Looks like a</tspan>
      <tspan x="119" dy="16.5">normal SIL.Harmony</tspan>
      <tspan x="119" dy="16.5">app. Hides the next</tspan>
      <tspan x="119" dy="16.5">stage inside itself.</tspan>
    </text>
    <g transform="translate(119,302)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M-14 -18 L8 -18 L14 -12 L14 18 L-14 18 Z"/>
      <path d="M8 -18 L8 -12 L14 -12"/>
      <path d="M-8 -4 L6 -4 M-8 3 L6 3 M-8 10 L2 10"/>
    </g>
  </g>

  <!-- Panel 2: Decrypt -->
  <g text-anchor="middle" fill="#ffffff">
    <circle cx="347" cy="88" r="33" fill="none" stroke="#ffffff" stroke-width="2.6"/>
    <text x="347" y="97" font-size="27" font-weight="bold">02</text>
    <text x="347" y="156" font-size="19" font-weight="bold">Decrypt</text>
    <text x="347" y="186" font-size="12.3" fill-opacity="0.82">
      <tspan x="347" dy="0">Decrypts a hidden</tspan>
      <tspan x="347" dy="16.5">byte array (~60 KB)</tspan>
      <tspan x="347" dy="16.5">in memory while</tspan>
      <tspan x="347" dy="16.5">it runs.</tspan>
    </text>
    <g transform="translate(347,302)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="-8" cy="-2" r="7"/>
      <path d="M-1 -2 L17 -2 M12 -2 L12 5 M17 -2 L17 7"/>
    </g>
  </g>

  <!-- Panel 3: Injector -->
  <g text-anchor="middle" fill="#ffffff">
    <circle cx="561" cy="88" r="33" fill="none" stroke="#ffffff" stroke-width="2.6"/>
    <text x="561" y="97" font-size="27" font-weight="bold">03</text>
    <text x="561" y="156" font-size="19" font-weight="bold">Injector</text>
    <text x="561" y="186" font-size="12.3" fill-opacity="0.82">
      <tspan x="561" dy="0">Stage 2. The class</tspan>
      <tspan x="561" dy="16.5">AudioSynthesizerCore</tspan>
      <tspan x="561" dy="16.5">does process</tspan>
      <tspan x="561" dy="16.5">hollowing.</tspan>
    </text>
    <g transform="translate(561,302)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 -15 L18 -15 L18 15 L3 15"/>
      <path d="M-18 0 L9 0 M3 -6 L9 0 L3 6"/>
    </g>
  </g>

  <!-- Panel 4: The RAT -->
  <g text-anchor="middle" fill="#ffffff">
    <circle cx="775" cy="88" r="33" fill="none" stroke="#ffffff" stroke-width="2.6"/>
    <text x="775" y="97" font-size="27" font-weight="bold">04</text>
    <text x="775" y="156" font-size="19" font-weight="bold">The RAT</text>
    <text x="775" y="186" font-size="12.3" fill-opacity="0.82">
      <tspan x="775" dy="0">Stage 3. The real</tspan>
      <tspan x="775" dy="16.5">payload. Heavily</tspan>
      <tspan x="775" dy="16.5">obfuscated, hidden</tspan>
      <tspan x="775" dy="16.5">in another process.</tspan>
    </text>
    <g transform="translate(775,302)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="0" cy="3" rx="8" ry="11"/>
      <circle cx="0" cy="-12" r="4"/>
      <path d="M-2 -15 L-6 -21 M2 -15 L6 -21"/>
      <path d="M-8 -2 L-17 -7 M-8 4 L-18 4 M-8 10 L-17 15 M8 -2 L17 -7 M8 4 L18 4 M8 10 L17 15"/>
    </g>
  </g>

  <!-- Panel 5: C2 -->
  <g text-anchor="middle" fill="#ffffff">
    <circle cx="989" cy="88" r="33" fill="none" stroke="#ffffff" stroke-width="2.6"/>
    <text x="989" y="97" font-size="27" font-weight="bold">05</text>
    <text x="989" y="156" font-size="19" font-weight="bold">C2</text>
    <text x="989" y="186" font-size="12.3" fill-opacity="0.82">
      <tspan x="989" dy="0">The RAT beacons to</tspan>
      <tspan x="989" dy="16.5">217.195.153.81</tspan>
      <tspan x="989" dy="16.5">port 50000,</tspan>
      <tspan x="989" dy="16.5">AES-encrypted.</tspan>
    </text>
    <g transform="translate(989,302)" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 16 L0 -7"/>
      <path d="M-7 16 L7 16"/>
      <circle cx="0" cy="-11" r="2.4" fill="#ffffff" stroke="none"/>
      <path d="M-6 -4 A9 9 0 0 1 -6 -18 M6 -4 A9 9 0 0 0 6 -18"/>
      <path d="M-12 0 A15 15 0 0 1 -12 -22 M12 0 A15 15 0 0 0 12 -22"/>
    </g>
  </g>
</svg>
